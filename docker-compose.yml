services:
  analytics-assistant:
    build: .
    env_file:
      - .env
    environment:
      OLLAMA_URL: ${DOCKER_OLLAMA_URL:-http://host.docker.internal:11434}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
